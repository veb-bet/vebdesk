name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  syntax:
    name: Syntax Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Compile check
        run: python -m py_compile vebdesk.py
      
      - name: AST validation
        run: python -c "import ast; ast.parse(open('vebdesk.py').read()); print('Valid Python syntax')"
      
      - name: Count lines
        run: echo "$(wc -l vebdesk.py | awk '{print $1}') lines of code"

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: syntax
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Install minimal deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libegl1 libgl1-mesa-glx xvfb
          pip install pyinstaller
      
      - name: Build
        run: pyinstaller --onefile vebdesk.py
      
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: VebDesk
          path: dist/vebdesk
