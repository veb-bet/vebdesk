name: CI

on: [push]

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t vebdesk .
      - name: Test import
        run: docker run --rm vebdesk
      - name: Build executable
        run: |
          docker run --rm -v $(pwd):/app vebdesk bash -c "pip install pyinstaller && pyinstaller --onefile vebdesk.py"
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: VebDesk
          path: dist/vebdesk
