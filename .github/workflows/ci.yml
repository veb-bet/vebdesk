name: CI

on: [push]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
      - name: Check Python syntax
        run: python -m py_compile vebdesk.py
      - name: Count lines
        run: echo "$(wc -l < vebdesk.py) lines of code"
      - name: Check imports
        run: grep "^import\|^from" vebdesk.py | head -10
