name: VebDesk CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Test Build
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libxcb-xinerama0 libxcb-icccm4 libxcb-image0 \
          libxcb-keysyms1 libxcb-randr0 libxcb-render-util0 libxcb-shape0 \
          libxcb-xfixes0 libxcb-xkb1 libxkbcommon-x11-0 xvfb
    
    - name: Install Python packages
      run: |
        pip install PyQt6
    
    - name: Check Python syntax
      run: |
        python -m py_compile vebdesk.py
    
    - name: Run import test with virtual display
      run: |
        xvfb-run -a python -c "
import sys
sys.path.insert(0, '.')
import vebdesk
print('✅ Import successful')
"
  
  build:
    name: Build Executable
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push'
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libxcb-xinerama0 libxcb-icccm4 libxcb-image0
        pip install PyQt6 pyinstaller
    
    - name: Build with PyInstaller
      run: |
        pyinstaller --onefile --name vebdesk vebdesk.py
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: vebdesk-linux
        path: dist/vebdesk
        retention-days: 30
